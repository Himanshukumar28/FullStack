<html lang="en">
<head>

    <title>Document</title>
    <style>
        p {
            display: none;
        }
        button {
            background-color: aqua;
        }
        button:hover + p {
            display: block;

        }

        img {
            height: 300px;
            width: 400px;
        }
        img:hover {
            height: 400px;
            width: 500px;
            /* margin: 30px; */
        }

        input:focus {

        }

        .btn-grad {
  background-image: linear-gradient(to right, #314755 0%, #26a0da 51%, #314755 100%);
}

.btn-grad {
  margin: 10px;
  padding: 15px 45px;
  text-align: center;
  text-transform: uppercase;
  transition: 0.5s;
  background-size: 200% auto;
  color: white;
  box-shadow: 0 0 20px #eee;
  border-radius: 10px;
  display: block;
  outline: none;
  border: none;
}

.btn-grad:hover {
  background-position: right center;
  color: #fff;
  text-decoration: none;
}

    </style>
</head>
