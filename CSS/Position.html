<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Position</title>
    <style>
        .container {
            height: 8000px;
            background: rgb(193, 172, 15);
        }
        .img2 {
            /* position: absolute; */
            position: relative;
            top: 50px;
            /* left: 20px; */
            /* bottom: 100px; */
            /* right: 20px; */
        }
        .img3 {
            position: sticky;
            top: 0;
        }
        .img1 {
            position: fixed;

        }
        .box {
            height: 2000px;
            background: aqua;
        }
    </style>
</head>
<body>
    <div class="container">
        <img class="img1" height="200px" width="200px" src="https://cdn.pixabay.com/photo/2015/04/19/08/32/flower-729510_1280.jpg">
        <img class="img2" height="200px" width="200px" src="https://images.unsplash.com/photo-1526779259212-939e64788e3c?fm=jpg&q=60&w=3000&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8M3x8ZnJlZSUyMGltYWdlc3xlbnwwfHwwfHx8MA%3D%3D">
        <img class="img3" height="200px" width="200px" src="https://img.freepik.com/free-photo/closeup-shot-beautiful-butterfly-with-interesting-textures-orange-petaled-flower_181624-7640.jpg?semt=ais_hybrid&w=740&q=80">
    </div>
    <div class="box"></div>
</body>
</html>
